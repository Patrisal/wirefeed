<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>WireFeed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#c8d0d8;font-family:-apple-system,sans-serif;font-size:13px;overflow:hidden;height:100vh;height:100dvh;position:fixed;width:100%}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:#0a0a0a;border-bottom:1px solid #1e1e1e;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:8px}
.dot.on{background:#f59e0b;animation:p .8s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.logo{font-family:monospace;font-weight:700;font-size:14px;color:#f59e0b}
.logo span{color:#4a5060;font-weight:400;font-size:11px;margin-left:4px}
.hdr-r{display:flex;align-items:center;gap:8px;font-family:monospace;font-size:11px;color:#4a5060}
.badge{background:#1e1e1e;padding:2px 6px;border-radius:3px;font-size:10px;color:#6b7280}
.rbtn{background:none;border:1px solid #1e1e1e;color:#6b7280;font-size:12px;padding:2px 8px;border-radius:3px;cursor:pointer;font-family:monospace}
.fbar{position:fixed;top:39px;left:0;right:0;z-index:99;background:#111;border-bottom:1px solid #1e1e1e;padding:6px 8px;display:flex;gap:5px;overflow-x:auto}
.fbar::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:3px 10px;border-radius:3px;border:1px solid #1e1e1e;background:transparent;color:#6b7280;font-family:monospace;font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.fb.on{background:#c8d0d8;color:#0a0a0a;border-color:#c8d0d8}
.fb[data-c="macro"].on{background:#f59e0b;border-color:#f59e0b}
.fb[data-c="geo"].on{background:#ef4444;border-color:#ef4444}
.fb[data-c="finance"].on{background:#3b82f6;border-color:#3b82f6}
.fb[data-c="rates"].on{background:#10b981;border-color:#10b981}
.fb[data-c="commodities"].on{background:#a855f7;border-color:#a855f7}
.fb[data-c="tech"].on{background:#06b6d4;border-color:#06b6d4}
.feed{position:fixed;top:70px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.row{display:flex;align-items:flex-start;padding:9px 12px;border-bottom:1px solid #1e1e1e;cursor:pointer;gap:8px}
.row:active{background:#1a1a1a}
.row.brk{background:rgba(255,59,59,.04);border-left:2px solid #ff3b3b;padding-left:10px}
.meta{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:38px}
.tm{font-family:monospace;font-size:10px;color:#4a5060}
.sr{font-family:monospace;font-size:9px;font-weight:600;padding:1px 4px;border-radius:2px;text-transform:uppercase}
.sr-dj{color:#f59e0b;background:rgba(245,158,11,.1)}
.sr-rtrs{color:#3b82f6;background:rgba(59,130,246,.1)}
.sr-bbn{color:#a855f7;background:rgba(168,85,247,.1)}
.sr-ft{color:#f97316;background:rgba(249,115,22,.1)}
.sr-wsj{color:#6b7280;background:rgba(107,114,128,.1)}
.sr-ecb{color:#10b981;background:rgba(16,185,129,.1)}
.sr-fed{color:#06b6d4;background:rgba(6,182,212,.1)}
.sr-imf{color:#8b5cf6;background:rgba(139,92,246,.1)}
.ct{flex:1;min-width:0}
.hl{font-size:13px;font-weight:500;color:#c8d0d8;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row.brk .hl{color:#fca5a5;font-weight:600}
.bt{color:#ff3b3b;font-family:monospace;font-size:10px;font-weight:700;margin-right:4px}
.tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.tg{font-family:monospace;font-size:9px;padding:1px 5px;border-radius:2px;font-weight:500}
.tg-macro{color:#f59e0b;background:rgba(245,158,11,.08)}
.tg-geo{color:#ef4444;background:rgba(239,68,68,.08)}
.tg-finance{color:#3b82f6;background:rgba(59,130,246,.08)}
.tg-rates{color:#10b981;background:rgba(16,185,129,.08)}
.tg-commodities{color:#a855f7;background:rgba(168,85,247,.08)}
.tg-tech{color:#06b6d4;background:rgba(6,182,212,.08)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#4a5060;font-family:monospace;font-size:12px;text-align:center;gap:8px}
.up{text-align:center;padding:6px;font-family:monospace;font-size:9px;color:#4a5060;border-bottom:1px solid #1e1e1e}
.detail{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease}
.detail.open{transform:translateX(0)}
.dhdr{position:sticky;top:0;background:#0a0a0a;border-bottom:1px solid #1e1e1e;padding:10px 12px;display:flex;align-items:center;gap:10px}
.dbk{background:none;border:none;color:#6b7280;font-size:18px;cursor:pointer;padding:4px}
.dbdy{padding:16px}
.dbdy h1{font-size:18px;font-weight:600;line-height:1.4;margin:8px 0 12px;color:#c8d0d8}
.dbdy .dt{font-family:monospace;font-size:11px;color:#4a5060;margin-bottom:16px}
.dbdy .dd{font-size:14px;line-height:1.7;color:#6b7280;margin-bottom:16px}
.dl{display:inline-block;font-family:monospace;font-size:11px;color:#3b82f6;text-decoration:none;padding:8px 14px;border:1px solid rgba(59,130,246,.3);border-radius:4px}
</style>
</head>
<body>
<div class="hdr">
<div style="display:flex;align-items:center"><div class="dot" id="dot"></div><div class="logo">WIRE<span>FEED</span></div></div>
<div class="hdr-r"><span id="clk"></span><span class="badge" id="cnt">0</span><button class="rbtn" id="rb" onclick="go()">↻</button></div>
</div>
<div class="fbar">
<button class="fb on" data-c="all" onclick="fil('all',this)">ALL</button>
<button class="fb" data-c="macro" onclick="fil('macro',this)">MACRO</button>
<button class="fb" data-c="geo" onclick="fil('geo',this)">GEO</button>
<button class="fb" data-c="finance" onclick="fil('finance',this)">FINANCE</button>
<button class="fb" data-c="rates" onclick="fil('rates',this)">RATES/FX</button>
<button class="fb" data-c="commodities" onclick="fil('commodities',this)">COMMO</button>
<button class="fb" data-c="tech" onclick="fil('tech',this)">TECH</button>
</div>
<div class="feed" id="feed"><div class="empty"><div style="font-size:24px">◇</div><div>Connecting...</div></div></div>
<div class="detail" id="det"><div class="dhdr"><button class="dbk" onclick="document.getElementById('det').classList.remove('open')">←</button><span style="font-family:monospace;font-size:11px;color:#4a5060">ARTICLE</span></div><div class="dbdy" id="dbdy"></div></div>
<script>
var URL='https://wirefeed.onrender.com/api/feed';
var items=[];
var cf='all';
var busy=false;

setInterval(function(){
  var n=new Date();
  document.getElementById('clk').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
},1000);

function ago(iso){
  var d=new Date(iso);
  if(isNaN(d.getTime()))return'--';
  var s=(Date.now()-d.getTime())/1000;
  if(s<60)return Math.floor(s)+'s';
  if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';
  return d.toLocaleDateString('en',{month:'short',day:'numeric'});
}

function esc(s){var e=document.createElement('span');e.textContent=s;return e.innerHTML}

function srcCls(c){return(c||'source-dj').replace('source-','sr-')}

function draw(){
  var f=document.getElementById('feed');
  var list=cf==='all'?items:items.filter(function(i){return i.categories&&i.categories.indexOf(cf)!==-1});
  document.getElementById('cnt').textContent=list.length;
  if(list.length===0){f.innerHTML='<div class="empty"><div style="font-size:24px">◇</div><div>No items</div></div>';return}
  var h='<div class="up">UPDATED '+new Date().toLocaleTimeString('en-GB')+' · '+list.length+' ITEMS</div>';
  for(var i=0;i<list.length;i++){
    var it=list[i];
    var b=it.breaking;
    var tags='';
    if(it.categories){for(var j=0;j<it.categories.length;j++){tags+='<span class="tg tg-'+it.categories[j]+'">'+it.categories[j].toUpperCase()+'</span>'}}
    h+='<div class="row'+(b?' brk':'')+'" onclick="det('+i+')">';
    h+='<div class="meta"><span class="tm">'+ago(it.pubDate)+'</span><span class="sr '+srcCls(it.sourceClass)+'">'+esc(it.source)+'</span></div>';
    h+='<div class="ct"><div class="hl">'+(b?'<span class="bt">● BREAKING</span>':'')+esc(it.title)+'</div>';
    h+='<div class="tags">'+tags+'</div></div></div>';
  }
  f.innerHTML=h;
}

function det(idx){
  var list=cf==='all'?items:items.filter(function(i){return i.categories&&i.categories.indexOf(cf)!==-1});
  var it=list[idx];if(!it)return;
  var tags='';
  if(it.categories){for(var j=0;j<it.categories.length;j++){tags+='<span class="tg tg-'+it.categories[j]+'">'+it.categories[j].toUpperCase()+'</span>'}}
  var d=new Date(it.pubDate);
  var ts=isNaN(d.getTime())?'':d.toLocaleString('en-GB',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('dbdy').innerHTML='<span class="sr '+srcCls(it.sourceClass)+'">'+esc(it.source)+'</span><h1>'+esc(it.title)+'</h1><div class="dt">'+ts+'</div><div class="tags" style="margin-bottom:16px">'+tags+'</div><div class="dd">'+esc(it.description||'No preview.')+'</div>'+(it.link?'<a href="'+it.link+'" target="_blank" class="dl">READ FULL ARTICLE →</a>':'');
  document.getElementById('det').classList.add('open');
}

function fil(c,btn){
  cf=c;
  var btns=document.querySelectorAll('.fb');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('on');
  btn.classList.add('on');
  draw();
}

function go(){
  if(busy)return;
  busy=true;
  document.getElementById('dot').classList.add('on');
  document.getElementById('rb').textContent='...';
  fetch(URL)
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.items&&data.items.length>0){
        items=data.items;
        draw();
      }
    })
    .catch(function(e){console.error(e)})
    .finally(function(){
      busy=false;
      document.getElementById('dot').classList.remove('on');
      document.getElementById('rb').textContent='↻';
    });
}

go();
setInterval(go,60000);
</script>
</body>
</html>
