<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>WireFeed</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--bg2:#111;--border:#1e1e1e;--text:#c8d0d8;--text2:#6b7280;--dim:#4a5060;--macro:#f59e0b;--geo:#ef4444;--finance:#3b82f6;--rates:#10b981;--commo:#a855f7;--tech:#06b6d4;--break:#ff3b3b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',-apple-system,sans-serif;font-size:13px;line-height:1.4;overflow:hidden;height:100vh;height:100dvh;-webkit-font-smoothing:antialiased;position:fixed;width:100%}
  .mono{font-family:'JetBrains Mono',monospace}
  .hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;padding-top:env(safe-area-inset-top,8px)}
  .hdr-l{display:flex;align-items:center;gap:8px}
  .dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
  .dot.fetching{background:#f59e0b;animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .logo{font-weight:700;font-size:14px;color:#f59e0b;letter-spacing:-.5px}
  .logo span{color:var(--dim);font-weight:400;font-size:11px;margin-left:4px}
  .hdr-r{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim)}
  .badge{background:#1e1e1e;padding:2px 6px;border-radius:3px;font-size:10px;color:var(--text2)}
  .rbtn{background:none;border:1px solid var(--border);color:var(--text2);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer}
  .rbtn:active{background:var(--border)}
  .pbar{position:fixed;top:37px;left:0;right:0;height:2px;z-index:101;overflow:hidden}
  .pbar .fill{height:100%;background:var(--macro);width:0%;transition:width .3s}
  .pbar.loading .fill{animation:loadbar 1.2s ease infinite}
  @keyframes loadbar{0%{width:0;margin-left:0}50%{width:40%;margin-left:30%}100%{width:0;margin-left:100%}}
  .fbar{position:fixed;top:39px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 8px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .fbar::-webkit-scrollbar{display:none}
  .fbtn{flex-shrink:0;padding:3px 10px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .fbtn:active,.fbtn.on{border-color:var(--text)}
  .fbtn.on{background:var(--text);color:var(--bg)}
  .fbtn[data-c="macro"].on{background:var(--macro);border-color:var(--macro)}
  .fbtn[data-c="geo"].on{background:var(--geo);border-color:var(--geo)}
  .fbtn[data-c="finance"].on{background:var(--finance);border-color:var(--finance)}
  .fbtn[data-c="rates"].on{background:var(--rates);border-color:var(--rates)}
  .fbtn[data-c="commodities"].on{background:var(--commo);border-color:var(--commo)}
  .fbtn[data-c="tech"].on{background:var(--tech);border-color:var(--tech)}
  .feed{position:fixed;top:70px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
  .feed::-webkit-scrollbar{width:3px}
  .feed::-webkit-scrollbar-track{background:#111}
  .feed::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
  .row{display:flex;align-items:flex-start;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;gap:8px;transition:background .1s}
  .row:active{background:#1a1a1a}
  .row.brk{background:rgba(255,59,59,.04);border-left:2px solid var(--break);padding-left:10px}
  .row.new{animation:slideIn .3s ease-out}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .meta{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:38px}
  .time{font-size:10px;color:var(--dim);letter-spacing:-.3px}
  .src{font-size:9px;font-weight:600;padding:1px 4px;border-radius:2px;text-transform:uppercase;letter-spacing:.3px}
  .src-dj{color:#f59e0b;background:rgba(245,158,11,.1)}
  .src-rtrs{color:#3b82f6;background:rgba(59,130,246,.1)}
  .src-bbn{color:#a855f7;background:rgba(168,85,247,.1)}
  .src-ft{color:#f97316;background:rgba(249,115,22,.1)}
  .src-wsj{color:#6b7280;background:rgba(107,114,128,.1)}
  .src-ecb{color:#10b981;background:rgba(16,185,129,.1)}
  .src-fed{color:#06b6d4;background:rgba(6,182,212,.1)}
  .src-imf{color:#8b5cf6;background:rgba(139,92,246,.1)}
  .content{flex:1;min-width:0}
  .hl{font-size:13px;font-weight:500;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .row.brk .hl{color:#fca5a5;font-weight:600}
  .brk-tag{color:var(--break);font-size:10px;font-weight:700;margin-right:4px;animation:flash 1.5s infinite}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}
  .tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
  .tag{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:500;letter-spacing:.3px}
  .t-macro{color:var(--macro);background:rgba(245,158,11,.08)}
  .t-geo{color:var(--geo);background:rgba(239,68,68,.08)}
  .t-finance{color:var(--finance);background:rgba(59,130,246,.08)}
  .t-rates{color:var(--rates);background:rgba(16,185,129,.08)}
  .t-commodities{color:var(--commo);background:rgba(168,85,247,.08)}
  .t-tech{color:var(--tech);background:rgba(6,182,212,.08)}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--dim);font-size:12px;text-align:center;gap:8px}
  .detail{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;-webkit-overflow-scrolling:touch}
  .detail.open{transform:translateX(0)}
  .dhdr{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:10px;padding-top:env(safe-area-inset-top,10px)}
  .dbck{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px}
  .dbody{padding:16px}
  .dbody h1{font-size:18px;font-weight:600;line-height:1.4;margin:8px 0 12px;color:var(--text)}
  .dbody .dtime{font-size:11px;color:var(--dim);margin-bottom:16px}
  .dbody .ddesc{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:16px}
  .dlink{display:inline-block;font-size:11px;color:#3b82f6;text-decoration:none;padding:8px 14px;border:1px solid rgba(59,130,246,.3);border-radius:4px}
  .dlink:active{background:rgba(59,130,246,.1)}
  .updated{text-align:center;padding:6px;font-size:9px;color:var(--dim);border-bottom:1px solid var(--border);letter-spacing:.5px}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-l"><div class="dot" id="dot"></div><div class="logo mono">WIRE<span>FEED</span></div></div><div class="hdr-r mono"><span id="clock"></span><span class="badge" id="count">0</span><button class="rbtn mono" id="rbtn" onclick="refresh()">↻</button></div></div>
<div class="pbar" id="pbar"><div class="fill"></div></div>
<div class="fbar" id="fbar"><button class="fbtn mono on" data-c="all" onclick="setFilter('all',this)">ALL</button><button class="fbtn mono" data-c="macro" onclick="setFilter('macro',this)">MACRO</button><button class="fbtn mono" data-c="geo" onclick="setFilter('geo',this)">GEO</button><button class="fbtn mono" data-c="finance" onclick="setFilter('finance',this)">FINANCE</button><button class="fbtn mono" data-c="rates" onclick="setFilter('rates',this)">RATES/FX</button><button class="fbtn mono" data-c="commodities" onclick="setFilter('commodities',this)">COMMO</button><button class="fbtn mono" data-c="tech" onclick="setFilter('tech',this)">TECH</button></div>
<div class="feed" id="feed"></div>
<div class="detail" id="detail"><div class="dhdr"><button class="dbck" onclick="closeDetail()">←</button><span class="mono" style="font-size:11px;color:var(--dim)">ARTICLE</span></div><div class="dbody" id="dbody"></div></div>
<script>
let allItems=[],currentFilter='all',refreshInterval=60000,timer=null,fetching=false;
function tickClock(){const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0')}
setInterval(tickClock,1000);tickClock();
function fmtTime(iso){const d=new Date(iso);if(isNaN(d.getTime()))return'--';const now=Date.now(),diff=(now-d.getTime())/1000;if(diff<60)return Math.floor(diff)+'s';if(diff<3600)return Math.floor(diff/60)+'m';if(diff<86400)return Math.floor(diff/3600)+'h';return d.toLocaleDateString('en',{month:'short',day:'numeric'})}
async function fetchFeed(){if(fetching)return;fetching=true;const dot=document.getElementById('dot'),pbar=document.getElementById('pbar'),rbtn=document.getElementById('rbtn');dot.classList.add('fetching');pbar.classList.add('loading');rbtn.textContent='...';try{const resp=await fetch('/api/feed');const data=await resp.json();if(data.items&&data.items.length>0){allItems=data.items;render()}}catch(e){console.error('Fetch error:',e)}fetching=false;dot.classList.remove('fetching');pbar.classList.remove('loading');rbtn.textContent='↻'}
function refresh(){fetchFeed();if(timer)clearInterval(timer);timer=setInterval(fetchFeed,refreshInterval)}
function esc(s){const el=document.createElement('span');el.textContent=s;return el.innerHTML}
function render(){const feed=document.getElementById('feed');const filtered=currentFilter==='all'?allItems:allItems.filter(i=>i.categories&&i.categories.includes(currentFilter));document.getElementById('count').textContent=filtered.length;if(filtered.length===0){feed.innerHTML='<div class="empty"><div style="font-size:24px">◇</div><div>No items</div></div>';return}const now=new Date();const updatedStr='LAST UPDATED '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});let html='<div class="updated mono">'+updatedStr+' · '+filtered.length+' ITEMS</div>';filtered.forEach((item,i)=>{const brk=item.breaking;const brkTag=brk?'<span class="brk-tag mono">● BREAKING</span>':'';const catTags=(item.categories||[]).map(c=>'<span class="tag mono t-'+c+'">'+c.toUpperCase()+'</span>').join('');const srcCls=(item.sourceClass||'source-dj').replace('source-','src-');html+='<div class="row'+(brk?' brk':'')+'" onclick="openDetail('+i+')"><div class="meta mono"><span class="time">'+fmtTime(item.pubDate)+'</span><span class="src '+srcCls+'">'+esc(item.source)+'</span></div><div class="content"><div class="hl">'+brkTag+esc(item.title)+'</div><div class="tags">'+catTags+'</div></div></div>'});feed.innerHTML=html}
function openDetail(idx){const filtered=currentFilter==='all'?allItems:allItems.filter(i=>i.categories&&i.categories.includes(currentFilter));const item=filtered[idx];if(!item)return;const srcCls=(item.sourceClass||'source-dj').replace('source-','src-');const catTags=(item.categories||[]).map(c=>'<span class="tag mono t-'+c+'">'+c.toUpperCase()+'</span>').join('');const d=new Date(item.pubDate);const timeStr=isNaN(d.getTime())?'':d.toLocaleString('en-GB',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});document.getElementById('dbody').innerHTML='<span class="src mono '+srcCls+'">'+esc(item.source)+'</span><h1>'+esc(item.title)+'</h1><div class="dtime mono">'+timeStr+'</div><div class="tags" style="margin-bottom:16px">'+catTags+'</div><div class="ddesc">'+esc(item.description||'No preview available.')+'</div>'+(item.link?'<a href="'+item.link+'" target="_blank" rel="noopener" class="dlink mono">READ FULL ARTICLE →</a>':'');document.getElementById('detail').classList.add('open')}
function closeDetail(){document.getElementById('detail').classList.remove('open')}
function setFilter(cat,btn){currentFilter=cat;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}
let touchStartY=0;const feedEl=document.getElementById('feed');feedEl.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY});feedEl.addEventListener('touchend',e=>{if(feedEl.scrollTop===0&&e.changedTouches[0].clientY-touchStartY>80)refresh()});
let detailTouchX=0;const detailEl=document.getElementById('detail');detailEl.addEventListener('touchstart',e=>{detailTouchX=e.touches[0].clientX});detailEl.addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-detailTouchX>80)closeDetail()});
document.getElementById('feed').innerHTML='<div class="empty"><div style="font-size:24px">◇</div><div class="mono">Connecting to wire feeds...</div><div class="mono" style="font-size:10px;margin-top:4px">Pull down to refresh</div></div>';
fetchFeed();timer=setInterval(fetchFeed,refreshInterval);
