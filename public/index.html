<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>WireFeed Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--bg2:#06060a;--bg3:#0e0e13;--bg4:#16161d;
  --border:#1a1a22;--border2:#28283a;
  --text:#e4e4ec;--text2:#85859a;--dim:#50506a;
  --amber:#ff9500;--amber2:#ffb84d;--amberbg:rgba(255,149,0,.05);
  --red:#ff3b30;--red2:#ff6b63;--redbg:rgba(255,59,48,.05);
  --blue:#0a84ff;--bluebg:rgba(10,132,255,.05);
  --green:#30d158;--greenbg:rgba(48,209,88,.05);
  --purple:#bf5af2;--purplebg:rgba(191,90,242,.05);
  --cyan:#64d2ff;--cyanbg:rgba(100,210,255,.05);
  --orange:#ff9f0a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.4;overflow:hidden;height:100vh;height:100dvh;position:fixed;width:100%;-webkit-font-smoothing:antialiased}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 10px;height:34px;display:flex;align-items:center;justify-content:space-between}
.topbar-l{display:flex;align-items:center;gap:6px}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.pulse.on{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:blink .5s infinite}
.pulse.ws{background:#00ff88;box-shadow:0 0 10px #00ff88,0 0 20px rgba(0,255,136,.3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.brand{font-size:10px;font-weight:700;color:var(--amber);letter-spacing:1.5px}
.brand i{color:var(--dim);font-style:normal;font-weight:400;font-size:8px;margin-left:3px;letter-spacing:.5px}
.topbar-r{display:flex;align-items:center;gap:6px}
.clk{font-size:9px;color:var(--dim);letter-spacing:.5px}
.cnt{font-size:8px;color:var(--amber);background:rgba(255,149,0,.08);padding:1px 5px;border-radius:2px;border:1px solid rgba(255,149,0,.15)}
.ws-badge{font-size:7px;padding:1px 4px;border-radius:2px;letter-spacing:.5px;color:var(--dim);background:rgba(80,80,106,.08);border:1px solid rgba(80,80,106,.15)}
.ws-badge.live{color:#00ff88;background:rgba(0,255,136,.08);border-color:rgba(0,255,136,.15)}
.rbtn{background:none;border:1px solid var(--border);color:var(--dim);font-family:inherit;font-size:9px;padding:1px 6px;border-radius:2px;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:var(--amber);color:var(--amber)}
.ticker{position:fixed;top:34px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:1px solid var(--border);height:26px;overflow-x:auto;overflow-y:hidden;display:flex;align-items:center;-webkit-overflow-scrolling:touch}
.ticker::-webkit-scrollbar{display:none}
.ticker-track{display:flex;white-space:nowrap;animation:tickscroll 100s linear infinite;will-change:transform}
.ticker-track.paused{animation-play-state:paused}
@keyframes tickscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk{display:inline-flex;align-items:center;gap:5px;padding:0 14px;font-size:9px;border-right:1px solid rgba(255,255,255,.04);height:26px;transition:background .2s}
.tk .tn{font-weight:600;letter-spacing:.3px;font-size:8px}
.tk .tp{color:var(--text);font-weight:500;font-size:9px;transition:color .3s,text-shadow .3s}
.tk .tc{font-weight:600;font-size:7px;letter-spacing:.3px}
.up{color:var(--green)}.dn{color:var(--red)}
.tn-commodity{color:var(--purple)}.tn-crypto{color:var(--orange)}.tn-fx{color:var(--cyan)}.tn-index{color:var(--amber)}.tn-rate{color:var(--green)}
.tp.tick-up{color:var(--green)!important;text-shadow:0 0 8px rgba(48,209,88,.6)}
.tp.tick-dn{color:var(--red)!important;text-shadow:0 0 8px rgba(255,59,48,.6)}
.arrow-up{display:inline-block;color:var(--green);font-size:7px;animation:arrowpulse .4s ease;margin-right:1px}
.arrow-dn{display:inline-block;color:var(--red);font-size:7px;animation:arrowpulse .4s ease;margin-right:1px}
@keyframes arrowpulse{0%{opacity:0;transform:translateY(3px)}50%{opacity:1}100%{opacity:1;transform:translateY(0)}}
.fbar{position:fixed;top:60px;left:0;right:0;z-index:98;background:var(--bg);border-bottom:1px solid var(--border);padding:4px 10px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:2px 8px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:8px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.8px;transition:all .15s}
.fb:hover{border-color:var(--text2);color:var(--text2)}
.fb.on{background:var(--amber);color:#000;border-color:var(--amber);font-weight:700}
.fb[data-c="macro"].on{background:var(--amber);border-color:var(--amber)}
.fb[data-c="geo"].on{background:var(--red);border-color:var(--red)}
.fb[data-c="finance"].on{background:var(--blue);border-color:var(--blue)}
.fb[data-c="rates"].on{background:var(--green);border-color:var(--green)}
.fb[data-c="commodities"].on{background:var(--purple);border-color:var(--purple)}
.fb[data-c="tech"].on{background:var(--cyan);border-color:var(--cyan);color:#000}
.subhdr{position:fixed;top:85px;left:0;right:0;z-index:97;background:var(--bg2);border-bottom:1px solid var(--border);padding:2px 10px;font-size:7px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;display:flex;gap:8px}
.feed{position:fixed;top:100px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);scroll-behavior:smooth}
.feed::-webkit-scrollbar{width:2px}.feed::-webkit-scrollbar-track{background:var(--bg)}.feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:1px}
.row{display:flex;align-items:flex-start;padding:6px 10px;border-bottom:1px solid var(--border);cursor:pointer;gap:7px;transition:background .15s}
.row:hover{background:var(--bg3)}
.row:nth-child(even){background:var(--bg2)}.row:nth-child(even):hover{background:var(--bg3)}
.row.brk{background:var(--redbg)!important;border-left:2px solid var(--red);padding-left:8px}
.row.fresh{animation:newsflash 1.5s ease}
@keyframes newsflash{0%{background:rgba(255,149,0,.12);transform:translateX(-4px)}30%{background:rgba(255,149,0,.06);transform:translateX(0)}100%{background:transparent}}
.row.brk.fresh{animation:breakflash 2s ease}
@keyframes breakflash{0%{background:rgba(255,59,48,.2);transform:translateX(-4px)}30%{background:rgba(255,59,48,.1);transform:translateX(0)}100%{background:rgba(255,59,48,.05)}}
.col-time{flex-shrink:0;width:30px;font-size:8px;color:var(--dim);text-align:right;padding-top:2px}
.col-src{flex-shrink:0;width:36px;text-align:center;padding-top:1px}
.sr{display:inline-block;font-size:7px;font-weight:600;padding:1px 4px;border-radius:1px;letter-spacing:.5px}
.sr-dj{color:var(--amber);background:var(--amberbg);border:1px solid rgba(255,149,0,.12)}
.sr-rtrs{color:var(--blue);background:var(--bluebg);border:1px solid rgba(10,132,255,.12)}
.sr-bbn{color:var(--purple);background:var(--purplebg);border:1px solid rgba(191,90,242,.12)}
.sr-ft{color:var(--orange);background:rgba(255,159,10,.05);border:1px solid rgba(255,159,10,.12)}
.sr-wsj{color:var(--text2);background:rgba(139,139,150,.05);border:1px solid rgba(139,139,150,.12)}
.sr-ecb{color:var(--green);background:var(--greenbg);border:1px solid rgba(48,209,88,.12)}
.sr-fed{color:var(--cyan);background:var(--cyanbg);border:1px solid rgba(100,210,255,.12)}
.sr-imf{color:var(--purple);background:var(--purplebg);border:1px solid rgba(191,90,242,.12)}
.col-content{flex:1;min-width:0}
.hl{font-size:11px;font-weight:400;color:var(--text);line-height:1.4;letter-spacing:.1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row.brk .hl{color:var(--red2);font-weight:500}
.bt{color:var(--red);font-size:7px;font-weight:700;letter-spacing:1px;margin-right:4px;animation:flash 1s infinite}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}
.tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.tg{font-size:6px;padding:0 4px;border-radius:1px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.tg-macro{color:var(--amber);background:var(--amberbg)}
.tg-geo{color:var(--red);background:var(--redbg)}
.tg-finance{color:var(--blue);background:var(--bluebg)}
.tg-rates{color:var(--green);background:var(--greenbg)}
.tg-commodities{color:var(--purple);background:var(--purplebg)}
.tg-tech{color:var(--cyan);background:var(--cyanbg)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--dim);font-size:10px;text-align:center;gap:10px;letter-spacing:.5px}
.sep{padding:3px 10px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:7px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;display:flex;justify-content:space-between}
.scroll-top{position:fixed;bottom:20px;right:14px;z-index:150;width:36px;height:36px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);color:var(--amber);font-size:14px;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.5);font-family:inherit}
.scroll-top:hover{background:var(--amber);color:#000;border-color:var(--amber)}
.scroll-top.show{display:flex}
.new-badge{position:fixed;top:102px;left:50%;transform:translateX(-50%);z-index:150;background:var(--amber);color:#000;font-size:8px;font-weight:700;letter-spacing:.8px;padding:4px 12px;border-radius:12px;cursor:pointer;display:none;box-shadow:0 4px 16px rgba(255,149,0,.3);animation:badgepulse 2s infinite}
.new-badge.show{display:block}
@keyframes badgepulse{0%,100%{box-shadow:0 4px 16px rgba(255,149,0,.3)}50%{box-shadow:0 4px 24px rgba(255,149,0,.5)}}
.detail{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;transform:translateX(100%);transition:transform .2s ease;-webkit-overflow-scrolling:touch}
.detail.open{transform:translateX(0)}
.dhdr{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;align-items:center;gap:8px;height:34px}
.dbk{background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;font-family:inherit;transition:color .15s}
.dbk:hover{color:var(--amber)}
.dbdy{padding:14px}
.dbdy h1{font-size:15px;font-weight:500;line-height:1.5;margin:10px 0 14px;color:var(--text);letter-spacing:.1px}
.dbdy .dt{font-size:8px;color:var(--dim);margin-bottom:14px;letter-spacing:.5px}
.dbdy .dd{font-size:11px;line-height:1.8;color:var(--text2);margin-bottom:18px;letter-spacing:.2px}
.dl{display:inline-block;font-size:8px;color:var(--amber);text-decoration:none;padding:6px 14px;border:1px solid rgba(255,149,0,.25);border-radius:2px;letter-spacing:.8px;font-weight:600;transition:all .15s}
.dl:hover{background:rgba(255,149,0,.1);border-color:var(--amber)}
</style>
</head>
<body>
<div class="topbar">
<div class="topbar-l"><div class="pulse" id="dot"></div><div class="brand">WIREFEED<i>TERMINAL</i></div></div>
<div class="topbar-r"><span class="ws-badge" id="wsbadge">REST</span><span class="clk" id="clk">--:--:--</span><span class="cnt" id="cnt">0</span><button class="rbtn" id="rb" onclick="go()">&#8635;</button></div>
</div>
<div class="ticker" id="tickerwrap"><div class="ticker-track" id="ticker"></div></div>
<div class="fbar">
<button class="fb on" data-c="all" onclick="fil('all',this)">ALL</button>
<button class="fb" data-c="macro" onclick="fil('macro',this)">MACRO</button>
<button class="fb" data-c="geo" onclick="fil('geo',this)">GEO</button>
<button class="fb" data-c="finance" onclick="fil('finance',this)">FINANCE</button>
<button class="fb" data-c="rates" onclick="fil('rates',this)">RATES/FX</button>
<button class="fb" data-c="commodities" onclick="fil('commodities',this)">COMMO</button>
<button class="fb" data-c="tech" onclick="fil('tech',this)">TECH</button>
</div>
<div class="subhdr"><span>TIME</span><span>SRC</span><span>HEADLINE</span></div>
<div class="feed" id="feed"><div class="empty">INITIALIZING FEED...</div></div>
<div class="new-badge" id="newbadge" onclick="scrollTop()">&#9650; NEW HEADLINES</div>
<button class="scroll-top" id="scrolltop" onclick="scrollTop()">&#9650;</button>
<div class="detail" id="det"><div class="dhdr"><button class="dbk" onclick="document.getElementById('det').classList.remove('open')">&#8249; BACK</button><span style="font-size:8px;color:var(--dim);letter-spacing:1px">ARTICLE DETAIL</span></div><div class="dbdy" id="dbdy"></div></div>
<script>
var BASE='https://wirefeed.onrender.com';
var FKEY='d4d3vnhr01qt1lahlv6gd4d3vnhr01qt1lahlv70';
var items=[];
var prevItemIds={};
var cf='all';
var busy=false;
var tickerData={};
var ws=null;
var wsConnected=false;

setInterval(function(){var n=new Date();document.getElementById('clk').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0')},1000);

function ago(iso){var d=new Date(iso);if(isNaN(d.getTime()))return'--';var s=(Date.now()-d.getTime())/1000;if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return d.toLocaleDateString('en',{month:'short',day:'numeric'})}
function esc(s){var e=document.createElement('span');e.textContent=s;return e.innerHTML}
function srcCls(c){return(c||'source-dj').replace('source-','sr-')}

var SYMBOLS=[
{s:'OANDA:EUR_USD',n:'EUR/USD',t:'fx'},
{s:'OANDA:EUR_GBP',n:'EUR/GBP',t:'fx'},
{s:'OANDA:GBP_USD',n:'GBP/USD',t:'fx'},
{s:'OANDA:USD_JPY',n:'USD/JPY',t:'fx'},
{s:'OANDA:EUR_CHF',n:'EUR/CHF',t:'fx'},
{s:'OANDA:AUD_USD',n:'AUD/USD',t:'fx'},
{s:'OANDA:XAU_USD',n:'GOLD',t:'commodity'},
{s:'OANDA:XAG_USD',n:'SILVER',t:'commodity'},
{s:'OANDA:BCO_USD',n:'BRENT',t:'commodity'},
{s:'BINANCE:BTCUSDT',n:'BTC',t:'crypto'},
{s:'BINANCE:ETHUSDT',n:'ETH',t:'crypto'},
{s:'SPY',n:'S&P500',t:'index'},
{s:'QQQ',n:'NDQ100',t:'index'},
{s:'DIA',n:'DOW30',t:'index'},
{s:'EWQ',n:'CAC40',t:'index'},
{s:'EWG',n:'DAX',t:'index'},
{s:'EWU',n:'FTSE',t:'index'},
{s:'EWJ',n:'NIKKEI',t:'index'},
{s:'EEM',n:'EM',t:'index'},
{s:'TLT',n:'US20Y+',t:'rate'},
{s:'AMZN',n:'AMZN',t:'index'},
{s:'NVDA',n:'NVDA',t:'index'},
{s:'AAPL',n:'AAPL',t:'index'},
{s:'MSFT',n:'MSFT',t:'index'},
{s:'META',n:'META',t:'index'},
{s:'TSLA',n:'TSLA',t:'index'},
{s:'GOOGL',n:'GOOG',t:'index'},
{s:'JPM',n:'JPM',t:'index'}
];

function fmtPrice(p,t){
if(t==='fx')return p>=100?p.toFixed(2):p.toFixed(4);
if(t==='crypto')return p>=1000?p.toFixed(0):p.toFixed(2);
if(p>=10000)return p.toFixed(0);
if(p>=100)return p.toFixed(1);
return p.toFixed(2);
}

function renderTicker(){
var ordered=SYMBOLS.filter(function(sym){return tickerData[sym.s]});
if(ordered.length===0)return;
var h='';
for(var i=0;i<ordered.length;i++){
var sym=ordered[i];
var d=tickerData[sym.s];
if(!d)continue;
var dir=d.change>=0?'up':'dn';
var arrowChar=d.change>=0?'&#9650;':'&#9660;';
var tickClass=d.tick||'';
var arrowAnim='';
if(d.tick==='tick-up')arrowAnim='<span class="arrow-up">&#9650;</span>';
else if(d.tick==='tick-dn')arrowAnim='<span class="arrow-dn">&#9660;</span>';
h+='<span class="tk">';
h+='<span class="tn tn-'+sym.t+'">'+sym.n+'</span> ';
h+=arrowAnim;
h+='<span class="tp '+tickClass+'">'+fmtPrice(d.price,sym.t)+'</span> ';
h+='<span class="tc '+dir+'">'+arrowChar+' '+(d.change>=0?'+':'')+d.pct.toFixed(2)+'%</span>';
h+='</span>';
}
if(h)document.getElementById('ticker').innerHTML=h+h;
setTimeout(function(){for(var k in tickerData){if(tickerData[k].tick)tickerData[k].tick=''}},800);
}

function loadTickerREST(){
var done=0;
SYMBOLS.forEach(function(sym,idx){
setTimeout(function(){
fetch('https://finnhub.io/api/v1/quote?symbol='+encodeURIComponent(sym.s)+'&token='+FKEY)
.then(function(r){return r.json()})
.then(function(q){
if(q&&q.c&&q.c>0){
var prev=tickerData[sym.s]?tickerData[sym.s].price:0;
var p=q.c;var pc=q.pc||p;
var ch=p-pc;var pct=pc?(ch/pc)*100:0;
var tick='';
if(prev>0&&p!==prev)tick=p>prev?'tick-up':'tick-dn';
tickerData[sym.s]={price:p,change:ch,pct:pct,tick:tick,prevClose:pc};
}
})
.catch(function(){})
.finally(function(){done++;if(done>=SYMBOLS.length)renderTicker()});
},idx*50);
});
}

function connectWebSocket(){
if(ws){try{ws.close()}catch(e){}}
ws=new WebSocket('wss://ws.finnhub.io?token='+FKEY);
ws.onopen=function(){
wsConnected=true;
document.getElementById('dot').classList.add('ws');
var b=document.getElementById('wsbadge');b.textContent='LIVE';b.classList.add('live');
SYMBOLS.forEach(function(sym){ws.send(JSON.stringify({type:'subscribe',symbol:sym.s}))});
};
ws.onmessage=function(event){
try{
var msg=JSON.parse(event.data);
if(msg.type==='trade'&&msg.data&&msg.data.length>0){
msg.data.forEach(function(trade){
var sym=SYMBOLS.find(function(s){return s.s===trade.s});
if(!sym)return;
var existing=tickerData[trade.s];
var prev=existing?existing.price:0;
var p=trade.p;
var pc=existing&&existing.prevClose?existing.prevClose:p;
var ch=p-pc;var pct=pc?(ch/pc)*100:0;
var tick='';
if(prev>0&&p!==prev)tick=p>prev?'tick-up':'tick-dn';
tickerData[trade.s]={price:p,change:ch,pct:pct,tick:tick,prevClose:pc};
});
renderTicker();
}
}catch(e){}
};
ws.onclose=function(){
wsConnected=false;
document.getElementById('dot').classList.remove('ws');
var b=document.getElementById('wsbadge');b.textContent='REST';b.classList.remove('live');
setTimeout(connectWebSocket,5000);
};
ws.onerror=function(){ws.close()};
}

var tickEl=document.getElementById('tickerwrap');
tickEl.addEventListener('touchstart',function(){document.getElementById('ticker').classList.add('paused')});
tickEl.addEventListener('touchend',function(){setTimeout(function(){document.getElementById('ticker').classList.remove('paused')},4000)});

function draw(isUpdate){
var f=document.getElementById('feed');
var list=cf==='all'?items:items.filter(function(i){return i.categories&&i.categories.indexOf(cf)!==-1});
document.getElementById('cnt').textContent=list.length;
if(list.length===0){f.innerHTML='<div class="empty">'+(items.length===0?'LOADING FEED...':'NO ITEMS IN '+cf.toUpperCase())+'</div>';return}
var h='';var last='';
for(var i=0;i<list.length;i++){
var it=list[i];var b=it.breaking;var ts=ago(it.pubDate);
var lbl='';
if(ts.indexOf('s')!==-1||ts.indexOf('m')!==-1)lbl='JUST NOW';
else if(ts==='1h'||ts==='2h')lbl='PAST HOUR';
else if(ts.indexOf('h')!==-1)lbl='EARLIER TODAY';
else lbl='PREVIOUS';
if(lbl!==last){h+='<div class="sep"><span>'+lbl+'</span><span>'+new Date().toLocaleDateString('en',{month:'short',day:'numeric'})+'</span></div>';last=lbl}
var itemKey=(it.title||'').substring(0,60);
var isFresh=isUpdate&&!prevItemIds[itemKey];
var freshClass=isFresh?' fresh':'';
var tags='';
if(it.categories){for(var j=0;j<it.categories.length;j++){tags+='<span class="tg tg-'+it.categories[j]+'">'+it.categories[j]+'</span>'}}
h+='<div class="row'+(b?' brk':'')+freshClass+'" onclick="det('+i+')">';
h+='<div class="col-time">'+ts+'</div>';
h+='<div class="col-src"><span class="sr '+srcCls(it.sourceClass)+'">'+esc(it.source)+'</span></div>';
h+='<div class="col-content"><div class="hl">'+(b?'<span class="bt">&#9889; BREAKING</span>':'')+esc(it.title)+'</div>';
h+='<div class="tags">'+tags+'</div></div></div>';
}
f.innerHTML=h;
prevItemIds={};
for(var k=0;k<items.length;k++){prevItemIds[(items[k].title||'').substring(0,60)]=true}
}

function det(idx){
var list=cf==='all'?items:items.filter(function(i){return i.categories&&i.categories.indexOf(cf)!==-1});
var it=list[idx];if(!it)return;
var tags='';
if(it.categories){for(var j=0;j<it.categories.length;j++){tags+='<span class="tg tg-'+it.categories[j]+'">'+it.categories[j].toUpperCase()+'</span>'}}
var d=new Date(it.pubDate);
var ts=isNaN(d.getTime())?'':d.toLocaleString('en-GB',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
document.getElementById('dbdy').innerHTML='<span class="sr '+srcCls(it.sourceClass)+'">'+esc(it.source)+'</span><h1>'+esc(it.title)+'</h1><div class="dt">'+ts+' &middot; '+ago(it.pubDate)+' AGO</div><div class="tags" style="margin-bottom:14px">'+tags+'</div><div class="dd">'+esc(it.description||'No preview.')+'</div>'+(it.link?'<a href="'+it.link+'" target="_blank" class="dl">OPEN SOURCE &rarr;</a>':'');
document.getElementById('det').classList.add('open');
}

function fil(c,btn){cf=c;var btns=document.querySelectorAll('.fb');for(var i=0;i<btns.length;i++)btns[i].classList.remove('on');btn.classList.add('on');draw(false)}

function scrollTop(){document.getElementById('feed').scrollTo({top:0,behavior:'smooth'});document.getElementById('newbadge').classList.remove('show')}

var feedEl=document.getElementById('feed');
feedEl.addEventListener('scroll',function(){
var btn=document.getElementById('scrolltop');
if(feedEl.scrollTop>300)btn.classList.add('show');else btn.classList.remove('show');
if(feedEl.scrollTop<50)document.getElementById('newbadge').classList.remove('show');
});

function go(){
if(busy)return;busy=true;
document.getElementById('dot').classList.add('on');
document.getElementById('rb').textContent='...';
fetch(BASE+'/api/feed')
.then(function(r){return r.json()})
.then(function(data){
if(data.items&&data.items.length>0){
var isUpdate=items.length>0;
var oldFirst=items.length>0?(items[0].title||'').substring(0,60):'';
items=data.items;
draw(isUpdate);
var newFirst=items.length>0?(items[0].title||'').substring(0,60):'';
if(isUpdate&&oldFirst!==newFirst&&feedEl.scrollTop>200){document.getElementById('newbadge').classList.add('show')}
}
})
.catch(function(e){console.error(e);document.getElementById('feed').innerHTML='<div class="empty">CONNECTION ERROR &mdash; TAP &#8635;</div>'})
.finally(function(){busy=false;document.getElementById('dot').classList.remove('on');document.getElementById('rb').innerHTML='&#8635;'});
}

var ty=0;
feedEl.addEventListener('touchstart',function(e){ty=e.touches[0].clientY});
feedEl.addEventListener('touchend',function(e){if(feedEl.scrollTop===0&&e.changedTouches[0].clientY-ty>80)go()});
var dxStart=0;var detEl=document.getElementById('det');
detEl.addEventListener('touchstart',function(e){dxStart=e.touches[0].clientX});
detEl.addEventListener('touchend',function(e){if(e.changedTouches[0].clientX-dxStart>80)detEl.classList.remove('open')});

loadTickerREST();
setTimeout(connectWebSocket,3000);
setInterval(function(){if(!wsConnected)loadTickerREST()},60000);
go();
setInterval(go,45000);
</script>
</body>
</html>
